<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LogSys Knowledge Graph</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"></span>
        <div>
          <strong>LogSys Knowledge Graph</strong>
          <em>架构图谱 × 异常链路 × 根因定位</em>
        </div>
      </div>
      <div class="toolbar">
        <label class="button primary" id="uploadLabel">
          <input id="fileInput" type="file" accept=".txt,.md,.yaml,.yml" />
          上传架构
        </label>
        <label class="button accent" id="incidentLabel">
          <input id="incidentInput" type="file" accept=".json,.zip,.csv" />
          导入异常链路
        </label>
        <label class="button" id="logAnalyzeLabel" title="需要后端配置 LOGFAULT_PROJECT_PATH 指向 v1-goat 仓库">
          <input id="logAnalyzeInput" type="file" accept=".zip,.log" />
          分析日志
        </label>
        <button id="addNodeBtn" class="button" type="button">新增节点</button>
        <button id="addEdgeBtn" class="button" type="button">新增关系</button>
        <button id="refreshBtn" class="button" type="button">刷新</button>
        <button id="fitBtn" class="button" type="button">居中</button>
        <button id="clearBtn" class="button danger" type="button">清空</button>
      </div>
    </header>

    <main class="graph-stage" id="graphStage">
      <canvas id="graphCanvas"></canvas>
      <aside id="legendPanel" class="legend-panel"></aside>
      <div id="emptyState" class="empty-state">
        <div class="empty-orbit"></div>
        <h1>先上传系统说明，再导入异常链路</h1>
        <p>架构节点、异常日志、trace 链路会在同一张知识图谱中关联展示。</p>
      </div>
      <div id="statusBar" class="status-bar">
        <span id="statusPulse" class="status-pulse"></span>
        <b id="statusText">正在连接图谱服务...</b>
        <i id="statusMeta">—</i>
      </div>
      <div id="tooltip" class="tooltip hidden"></div>
      <div id="detailPanel" class="detail-panel hidden">
        <button id="detailClose" class="icon-button" type="button">×</button>
        <span id="detailKind" class="detail-kicker"></span>
        <h2 id="detailTitle"></h2>
        <p id="detailDesc"></p>
        <dl id="detailMeta"></dl>
        <div class="detail-actions">
          <button id="editSelectedBtn" class="button small" type="button">编辑</button>
          <button id="deleteSelectedBtn" class="button small danger" type="button">删除</button>
        </div>
      </div>
      <div id="toast" class="toast hidden"></div>
    </main>
  </div>

  <div id="editModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <button id="modalClose" class="icon-button" type="button">×</button>
      <h3 id="modalTitle">编辑</h3>
      <div id="nodeFields" class="form-grid">
        <label>名称<input id="nodeName" type="text" /></label>
        <label>类型<select id="nodeKind"></select></label>
        <label>层级<input id="nodeLayer" type="text" /></label>
        <label>来源<input id="nodeSource" type="text" /></label>
        <label class="wide">描述<textarea id="nodeDesc"></textarea></label>
        <label class="wide">Meta JSON<textarea id="nodeMeta"></textarea></label>
      </div>
      <div id="edgeFields" class="form-grid hidden">
        <label>起点<input id="edgeSource" type="text" list="nodeNameList" /></label>
        <label>终点<input id="edgeTarget" type="text" list="nodeNameList" /></label>
        <label>关系类型<input id="edgeType" type="text" list="relationTypeList" /></label>
        <label class="wide">描述<textarea id="edgeDesc"></textarea></label>
        <label class="wide">Meta JSON<textarea id="edgeMeta"></textarea></label>
      </div>
      <datalist id="nodeNameList"></datalist>
      <datalist id="relationTypeList"></datalist>
      <div class="modal-actions">
        <button id="modalCancel" class="button" type="button">取消</button>
        <button id="modalSave" class="button primary" type="button">保存</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
